<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>automate — network hero, 5 versions</title>
<meta name="robots" content="noindex,nofollow">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
 :root{--red:#dc1915}
 body{background:#fbf7f7;color:#1a2042;font-family:Inter,sans-serif}
 .vtag{font-size:13px;font-weight:800;color:#1a2042;background:#fff;border:1px solid rgba(26,32,66,.12);border-radius:999px;padding:5px 14px;display:inline-block}
 .hero{position:relative;border-radius:22px;overflow:hidden;background:radial-gradient(120% 120% at 78% 12%,#202657 0%,#12152e 55%,#0c0e22 100%);min-height:430px;display:flex;align-items:center}
 .hero canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
 .hero .scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,rgba(12,14,34,.93) 0%,rgba(12,14,34,.7) 40%,rgba(12,14,34,.15) 72%,rgba(12,14,34,.34) 100%)}
 .hero .inner{position:relative;z-index:2;padding:46px 44px;max-width:600px}
 .eyebrow{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#ff9b97}
 .hero h2{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.07;color:#fff;letter-spacing:-.02em;margin:12px 0 0}
 .hero p{color:rgba(255,255,255,.83);margin:15px 0 0;font-size:15px;max-width:31ch}
 .btn{display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:var(--red);color:#fff;font-weight:700;border-radius:12px;padding:12px 20px;font-size:15px}
</style>
</head>
<body>
<header class="max-w-5xl mx-auto px-6 pt-12 pb-6">
  <div class="inline-block px-3 py-1 rounded-full text-[#dc1915] text-xs font-bold mb-3" style="background:#fdecec">Internal · concepts · not indexed</div>
  <h1 class="text-3xl sm:text-4xl font-extrabold">Network hero — 5 versions</h1>
  <p class="text-[#6b7088] mt-3 max-w-2xl leading-relaxed">Same idea (custom task-icons wired together + OJI red-square hubs + flowing pulses), five different compositions/behaviours. Tell me the number — and any tweak — and I’ll wire it into the homepage.</p>
</header>
<main class="max-w-5xl mx-auto px-6 pb-24 space-y-9" id="grid"></main>

<script>
const ICONS=['email','gear','doc','bolt','robot','chart'];
const imgs=ICONS.map(s=>{const i=new Image();i.src='/hero/nodes/'+s+'.webp';return i;});
const live=new Set();
function fit(cv){const p=cv.parentElement;const dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.max(1,p.clientWidth*dpr);cv.height=Math.max(1,p.clientHeight*dpr);const x=cv.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);return {x,W:p.clientWidth,H:p.clientHeight};}
function paint(ctx,px,py,n,tk){const g=.6+.4*Math.sin(tk*.045+n.ph);
 if(n.type==='sq'){const s=n.size;ctx.save();ctx.shadowColor='#dc1915';ctx.shadowBlur=(n.hub?28:18)*g;ctx.fillStyle='#dc1915';ctx.fillRect(px-s/2,py-s/2,s,s);ctx.restore();}
 else{const img=imgs[n.type],s=n.size;if(img&&img.complete&&img.naturalWidth){ctx.save();ctx.shadowColor='rgba(255,225,170,.85)';ctx.shadowBlur=12*g;ctx.globalAlpha=.97;ctx.drawImage(img,px-s/2,py-s/2,s,s);ctx.restore();}else{ctx.fillStyle='#8aa0ff';ctx.beginPath();ctx.arc(px,py,3,0,7);ctx.fill();}}}

function engine(cv,cfg){let x,W,H,pts,pulses,tick,hub;
 function setup(){const f=fit(cv);x=f.x;W=f.W;H=f.H;pulses=[];tick=0;hub=cfg.hub?{x:W*0.72,y:H*0.47,ph:0,type:'sq',size:40,hub:true}:null;
   const N=Math.max(cfg.n[0],Math.min(cfg.n[1],Math.round(W*H/cfg.div)));pts=[];
   for(let k=0;k<N;k++){const sq=Math.random()<cfg.sqRatio;pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*cfg.speed,vy:(Math.random()-.5)*cfg.speed,ph:Math.random()*6.28,type:sq?'sq':(Math.random()*ICONS.length)|0,size:sq?(cfg.sq[0]+Math.random()*cfg.sq[1]):(cfg.ic[0]+Math.random()*cfg.ic[1])});}}
 function frame(){if(!live.has(cv.id))return;tick++;x.clearRect(0,0,W,H);
   for(const a of pts){a.x+=a.vx;a.y+=a.vy;if(a.x<8||a.x>W-8)a.vx*=-1;if(a.y<8||a.y>H-8)a.vy*=-1;}
   const links=[];
   for(let i=0;i<pts.length;i++){const a=pts[i];
     if(hub){const d=Math.hypot(a.x-hub.x,a.y-hub.y);if(d<cfg.linkDist*1.8){x.globalAlpha=(1-d/(cfg.linkDist*1.8))*.5;x.strokeStyle='#7385d4';x.lineWidth=1;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(hub.x,hub.y);x.stroke();links.push([a,hub]);}}
     for(let j=i+1;j<pts.length;j++){const b=pts[j];const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<cfg.linkDist){x.globalAlpha=(1-d/cfg.linkDist)*.4;x.strokeStyle='#6b7cd0';x.lineWidth=1;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();if(!hub)links.push([a,b]);}}}
   x.globalAlpha=1;
   if(links.length&&tick%cfg.pulseEvery===0){const lk=links[(Math.random()*links.length)|0];pulses.push({a:lk[0],b:lk[1],t:0,sp:.02+Math.random()*.025,c:Math.random()<.55?'#ff7a45':'#e6b23a'});}
   for(let p=pulses.length-1;p>=0;p--){const pu=pulses[p];pu.t+=pu.sp;if(pu.t>=1){pulses.splice(p,1);continue;}const px=pu.a.x+(pu.b.x-pu.a.x)*pu.t,py=pu.a.y+(pu.b.y-pu.a.y)*pu.t;x.fillStyle=pu.c;x.shadowColor=pu.c;x.shadowBlur=12;x.beginPath();x.arc(px,py,2.4,0,7);x.fill();}
   x.shadowBlur=0;for(const n of pts)paint(x,n.x,n.y,n,tick);if(hub)paint(x,hub.x,hub.y,hub,tick);
   requestAnimationFrame(frame);}
 cv._start=()=>{setup();if(!live.has(cv.id)){live.add(cv.id);frame();}};cv._stop=()=>live.delete(cv.id);
 addEventListener('resize',()=>{if(live.has(cv.id))setup();});
}

function grid(cv){let x,W,H,nodes,links,pulses,tick;
 function pos(n){return {x:n.gx+Math.sin(tick*.02+n.ph)*n.amp,y:n.gy+Math.cos(tick*.02+n.ph*1.3)*n.amp};}
 function setup(){const f=fit(cv);x=f.x;W=f.W;H=f.H;pulses=[];tick=0;
   const cols=Math.max(4,Math.round(W/120)),rows=Math.max(3,Math.round(H/110));const cw=W/(cols+1),ch=H/(rows+1);
   nodes=[];const idx={};
   for(let r=1;r<=rows;r++)for(let c=1;c<=cols;c++){const sq=Math.random()<.4;const n={gx:c*cw,gy:r*ch,c,r,ph:Math.random()*6.28,amp:4+Math.random()*6,type:sq?'sq':(Math.random()*ICONS.length)|0,size:sq?16:30};idx[c+','+r]=n;nodes.push(n);}
   links=[];for(const n of nodes){const R=idx[(n.c+1)+','+n.r],D=idx[n.c+','+(n.r+1)];if(R&&Math.random()<.82)links.push([n,R]);if(D&&Math.random()<.55)links.push([n,D]);}}
 function frame(){if(!live.has(cv.id))return;tick++;x.clearRect(0,0,W,H);
   x.globalAlpha=.3;x.strokeStyle='#6b7cd0';x.lineWidth=1;for(const[a,b]of links){const pa=pos(a),pb=pos(b);x.beginPath();x.moveTo(pa.x,pa.y);x.lineTo(pb.x,pb.y);x.stroke();}x.globalAlpha=1;
   if(links.length&&tick%3===0){const lk=links[(Math.random()*links.length)|0];pulses.push({a:lk[0],b:lk[1],t:0,sp:.025+Math.random()*.02,c:Math.random()<.55?'#ff7a45':'#e6b23a'});}
   for(let p=pulses.length-1;p>=0;p--){const pu=pulses[p];pu.t+=pu.sp;if(pu.t>=1){pulses.splice(p,1);continue;}const pa=pos(pu.a),pb=pos(pu.b),px=pa.x+(pb.x-pa.x)*pu.t,py=pa.y+(pb.y-pa.y)*pu.t;x.fillStyle=pu.c;x.shadowColor=pu.c;x.shadowBlur=12;x.beginPath();x.arc(px,py,2.4,0,7);x.fill();}
   x.shadowBlur=0;for(const n of nodes){const p=pos(n);paint(x,p.x,p.y,n,tick);}
   requestAnimationFrame(frame);}
 cv._start=()=>{setup();if(!live.has(cv.id)){live.add(cv.id);frame();}};cv._stop=()=>live.delete(cv.id);
 addEventListener('resize',()=>{if(live.has(cv.id))setup();});
}

const C1={div:22000,n:[16,28],sqRatio:.42,sq:[15,8],ic:[28,16],linkDist:170,pulseEvery:5,speed:.5,hub:false};
const C2={div:30000,n:[12,18],sqRatio:.22,sq:[12,6],ic:[28,16],linkDist:150,pulseEvery:4,speed:.45,hub:true};
const C3={div:12000,n:[30,48],sqRatio:.45,sq:[10,6],ic:[18,12],linkDist:118,pulseEvery:2,speed:.6,hub:false};
const C4={div:44000,n:[8,13],sqRatio:.34,sq:[18,9],ic:[42,26],linkDist:240,pulseEvery:12,speed:.22,hub:false};
const VS=[
 {id:'v1',tag:'1 · Constellation',desc:'Balanced free-floating mix — the version you saw.',init:cv=>engine(cv,C1)},
 {id:'v2',tag:'2 · Central hub',desc:'Everything flows INTO one big OJI red square — “all your work routes through OJI”.',init:cv=>engine(cv,C2)},
 {id:'v3',tag:'3 · Dense mesh',desc:'Busy + energetic: many small nodes, fast pulses, lots of red squares.',init:cv=>engine(cv,C3)},
 {id:'v4',tag:'4 · Calm & spacious',desc:'Few big showcase icons, slow drift, premium negative space.',init:cv=>engine(cv,C4)},
 {id:'v5',tag:'5 · Workflow grid',desc:'Structured like an automation canvas — nodes on a grid, pulses along the wires.',init:cv=>grid(cv)},
];
document.getElementById('grid').innerHTML=VS.map(v=>`
 <div>
   <div class="flex items-baseline gap-3 mb-3 flex-wrap"><span class="vtag">${v.tag}</span><span class="text-[#6b7088] text-sm">${v.desc}</span></div>
   <section class="hero"><canvas id="${v.id}"></canvas><div class="scrim"></div>
     <div class="inner"><div class="eyebrow">AI-powered business automation</div><h2>Automate the work a machine should be doing.</h2><p>AI automations that quietly run your repetitive work — in your brand, in one flow.</p><span class="btn">Book a free automation audit →</span></div>
   </section>
 </div>`).join('');

const io=new IntersectionObserver(es=>{es.forEach(e=>{const cv=e.target;if(e.isIntersecting)cv._start&&cv._start();else cv._stop&&cv._stop();});},{threshold:.1});
function boot(){VS.forEach(v=>{const cv=document.getElementById(v.id);if(cv){v.init(cv);io.observe(cv);cv._start();}});}
if(document.readyState==='complete')boot();else addEventListener('load',boot);
</script>
</body>
</html>
