<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OJI · automate — Leads</title>
<meta name="robots" content="noindex,nofollow">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{navy:{DEFAULT:'#1a2042',600:'#252c54',50:'#eef0f6'},red:{DEFAULT:'#dc1915'},paper:'#fbf7f7',muted:'#6b7088'}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
 body{background:#fbf7f7;color:#1a2042;font-family:Inter,'Noto Sans JP',sans-serif}
 .lk{display:inline-flex;align-items:center;gap:8px;text-decoration:none}
 .lk .mk{height:22px;width:auto;display:block}
 .lk .wm{font-weight:800;font-size:22px;letter-spacing:-.02em;line-height:1;display:inline-flex;align-items:flex-end}
 .lk .sq{display:inline-block;width:.22em;height:.22em;background:#dc1915;margin-left:.08em;flex:none}
 .lk.light .mk{color:#dc1915}.lk.light .wm{color:#1a2042}
 .lk.dark .mk{color:#fff}.lk.dark .wm{color:#fff}
 .pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;white-space:nowrap}
 .chip{font-size:12px;font-weight:700;padding:6px 13px;border-radius:999px;border:1px solid rgba(26,32,66,.14);cursor:pointer;transition:.12s;background:#fff}
 .chip:hover{border-color:rgba(26,32,66,.4)}
 .chip.on{background:#1a2042;color:#fff;border-color:#1a2042}
 .lead{background:#fff;border:1px solid rgba(26,32,66,.09);border-radius:14px;padding:16px 18px;display:flex;gap:16px;align-items:flex-start;transition:.12s}
 .lead:hover{box-shadow:0 10px 30px -18px rgba(26,32,66,.35);transform:translateY(-1px)}
 .fld{width:100%;border:1px solid #d9d6dd;border-radius:11px;padding:12px 14px;font-size:15px;outline:none;font-family:inherit}
 .fld:focus{border-color:#1a2042;box-shadow:0 0 0 3px rgba(26,32,66,.12)}
 .btnp{background:#dc1915;color:#fff;font-weight:700;border:none;border-radius:11px;padding:12px;font-size:15px;cursor:pointer;width:100%}
 .btnp:hover{background:#c1130f}
 .mksvg{flex:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" style="position:fixed;inset:0;z-index:50;background:linear-gradient(135deg,#1a2042,#2a3160 60%,#3a2050);display:none;align-items:center;justify-content:center;padding:20px">
 <div style="background:#fff;border-radius:20px;padding:38px 34px;max-width:370px;width:100%;box-shadow:0 24px 60px -20px rgba(0,0,0,.55)">
   <span class="lk light" style="margin-bottom:4px"><svg class="mk" viewBox="0 0 3539.89 1384.67" fill="currentColor"><path d="M692.34,0C310.1,0,0,310.1,0,692.33s310.1,692.34,692.34,692.34,692.09-310.1,692.09-692.34S1074.57,0,692.34,0Z"/><polygon points="3085.75 0 3085.75 692.33 3085.75 1384.43 3539.89 1384.43 3539.89 692.33 3539.89 0 3085.75 0"/><path d="M2189.89,0c3.28,117.58,18.27,692.33-.47,692.33H1497.09c0,382.24,309.86,692.1,692.33,692.1,382.23,0,692.1-309.86,692.1-692.1C2881.52,310.33,2571.89.47,2189.89,0Z"/></svg><span class="wm">automate<i class="sq"></i></span></span>
   <div class="text-muted text-sm mt-3 mb-6">Leads dashboard — sign in</div>
   <form onsubmit="return signIn(event)">
     <input id="pw" type="password" class="fld" placeholder="Password" autocomplete="current-password">
     <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7088;margin:12px 2px 6px"><input type="checkbox" id="remember" checked> Keep me signed in</label>
     <button type="submit" class="btnp" style="margin-top:6px">Sign in</button>
     <p id="loginerr" style="color:#dc1915;font-size:13px;margin-top:11px;display:none">Wrong password — try again.</p>
   </form>
   <div style="display:flex;gap:16px;margin-top:14px;font-size:12.5px">
     <a onclick="resendPw()" style="color:#6b7088;cursor:pointer;text-decoration:underline">Email me the password</a>
     <a onclick="document.getElementById('codebox').style.display='block';document.getElementById('codeInput').focus()" style="color:#6b7088;cursor:pointer;text-decoration:underline">Use a login code</a>
   </div>
   <div id="codebox" style="display:none;margin-top:14px;border-top:1px solid #eef0f6;padding-top:14px">
     <button onclick="sendCode()" class="btnp" style="background:#1a2042">Email me a 6-digit code</button>
     <form onsubmit="return verifyCode(event)" style="display:flex;gap:8px;margin-top:9px">
       <input id="codeInput" class="fld" placeholder="6-digit code" inputmode="numeric" autocomplete="one-time-code" style="flex:1">
       <button type="submit" class="btnp" style="width:auto;padding:12px 18px">Verify</button>
     </form>
   </div>
   <p id="accmsg" style="font-size:12.5px;color:#1f9d76;margin-top:11px;min-height:1.1em"></p>
 </div>
</div>

<header class="sticky top-0 z-20 bg-paper/90 backdrop-blur border-b border-navy/10">
 <div class="max-w-6xl mx-auto px-5 h-[62px] flex items-center justify-between gap-3">
   <div class="flex items-center gap-3 min-w-0">
     <span class="lk light"><svg class="mk" viewBox="0 0 3539.89 1384.67" fill="currentColor"><path d="M692.34,0C310.1,0,0,310.1,0,692.33s310.1,692.34,692.34,692.34,692.09-310.1,692.09-692.34S1074.57,0,692.34,0Z"/><polygon points="3085.75 0 3085.75 692.33 3085.75 1384.43 3539.89 1384.43 3539.89 692.33 3539.89 0 3085.75 0"/><path d="M2189.89,0c3.28,117.58,18.27,692.33-.47,692.33H1497.09c0,382.24,309.86,692.1,692.33,692.1,382.23,0,692.1-309.86,692.1-692.1C2881.52,310.33,2571.89.47,2189.89,0Z"/></svg><span class="wm">automate<i class="sq"></i></span></span>
     <span class="hidden sm:block w-px h-6 bg-navy/15"></span>
     <span class="hidden sm:block text-[13px] font-bold text-muted">Leads</span>
   </div>
   <div class="flex items-center gap-2.5 text-sm">
     <span id="count" class="text-muted text-[13px] hidden sm:block"></span>
     <button onclick="load()" class="chip">↻ Refresh</button>
     <a href="https://alexderyczs-team.monday.com/boards/18419481035" target="_blank" class="chip on">Monday →</a>
     <button onclick="signOut()" class="chip">Sign out</button>
   </div>
 </div>
</header>

<main class="max-w-6xl mx-auto px-5 py-8">
 <div class="flex items-end justify-between gap-3 flex-wrap mb-6">
   <div>
     <h1 class="text-2xl font-extrabold">Inquiries</h1>
     <p class="text-muted text-sm mt-1">Live view of the <b class="text-navy">🤖 AUTOMATE — Leads</b> board. Reply &amp; manage from the inquiry email (one-click approve) or in Monday.</p>
   </div>
   <div id="filters" class="flex gap-2 flex-wrap"></div>
 </div>
 <div id="state" class="text-muted text-sm py-20 text-center">Loading…</div>
 <div id="list" class="space-y-2.5"></div>
</main>

<script>
const WEBHOOK="https://ojidigital.app.n8n.cloud/webhook/automate-leads";
const SC={New:'#2563eb',Contacted:'#1f9d76',Quoted:'#c98a14',Won:'#16a34a',Lost:'#9aa0b0',Spam:'#dc1915'};
let ALL=[], filter='all';
function getKey(){ try{ return (localStorage.getItem('oji_leads_key')||sessionStorage.getItem('oji_leads_key')||'').trim(); }catch(e){ return ''; } }
function showLogin(err){ document.getElementById('login').style.display='flex'; document.getElementById('loginerr').style.display=err?'block':'none'; const pw=document.getElementById('pw'); if(pw){ pw.value=''; pw.focus(); } }
function signIn(e){ e.preventDefault(); const k=document.getElementById('pw').value.trim(); if(!k) return false; try{ localStorage.removeItem('oji_leads_key'); sessionStorage.removeItem('oji_leads_key'); (document.getElementById('remember').checked?localStorage:sessionStorage).setItem('oji_leads_key',k); }catch(e2){} document.getElementById('login').style.display='none'; load(); return false; }
function signOut(){ try{ localStorage.removeItem('oji_leads_key'); sessionStorage.removeItem('oji_leads_key'); }catch(e){} ALL=[]; document.getElementById('list').innerHTML=''; document.getElementById('count').textContent=''; showLogin(false); }
const ACCESS="https://ojidigital.app.n8n.cloud/webhook/admin-access";
function accMsg(t,err){ const m=document.getElementById('accmsg'); if(m){ m.textContent=t||''; m.style.color=err?'#dc1915':'#1f9d76'; } }
async function access(action,extra){ const r=await fetch(ACCESS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({action},extra||{}))}); return r.json(); }
async function resendPw(){ accMsg('Sending…'); try{ const d=await access('resend'); accMsg(d&&d.ok?'Password emailed to you ✓':'Could not send.', !(d&&d.ok)); }catch(e){ accMsg('Could not send — try again.',true); } }
async function sendCode(){ accMsg('Sending code…'); document.getElementById('codebox').style.display='block'; try{ const d=await access('request-code'); accMsg(d&&d.ok?'Code emailed — enter it below ✓':'Could not send.', !(d&&d.ok)); const ci=document.getElementById('codeInput'); if(ci)ci.focus(); }catch(e){ accMsg('Could not send — try again.',true); } }
async function verifyCode(e){ if(e)e.preventDefault(); const code=document.getElementById('codeInput').value.trim(); if(!code)return false; accMsg('Checking…'); try{ const d=await access('verify-code',{code}); if(d&&d.ok&&d.token){ try{ localStorage.removeItem('oji_leads_key'); sessionStorage.removeItem('oji_leads_key'); (document.getElementById('remember').checked?localStorage:sessionStorage).setItem('oji_leads_key',d.token); }catch(e2){} document.getElementById('login').style.display='none'; load(); } else accMsg('Invalid or expired code — request a new one.',true); }catch(e3){ accMsg('Error — try again.',true); } return false; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(d){ if(!d) return ''; const t=new Date(d); if(isNaN(t)) return ''; return t.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
async function load(){
  const key=getKey(); if(!key){ showLogin(false); return; }
  const st=document.getElementById('state'); st.style.display='block'; st.textContent='Loading…'; document.getElementById('list').innerHTML='';
  try{
    const r=await fetch(WEBHOOK+'?token='+encodeURIComponent(key)+'&cb='+Date.now());
    const d=await r.json();
    if(!d||!d.leads) throw new Error('bad');
    ALL=d.leads.sort((a,b)=>(b.created||'').localeCompare(a.created||''));
    render();
  }catch(e){ showLogin(true); }
}
function render(){
  document.getElementById('state').style.display='none';
  const counts={}; ALL.forEach(l=>counts[l.status]=(counts[l.status]||0)+1);
  const statuses=['all',...Object.keys(SC)];
  document.getElementById('filters').innerHTML=statuses.map(s=>{
    const n=s==='all'?ALL.length:(counts[s]||0);
    return `<span class="chip ${filter===s?'on':''}" onclick="filter='${s}';render()">${s==='all'?'All':s} <span style="opacity:.6">${n}</span></span>`;
  }).join('');
  const rows=ALL.filter(l=>filter==='all'||l.status===filter);
  document.getElementById('count').textContent=ALL.length+' total · '+(counts['New']||0)+' new';
  if(!rows.length){ document.getElementById('list').innerHTML='<div class="text-muted text-sm py-20 text-center">No leads'+(filter!=='all'?' in “'+filter+'”':' yet')+'. New inquiries from the site land here automatically.</div>'; return; }
  document.getElementById('list').innerHTML=rows.map(l=>{
    const c=SC[l.status]||'#9aa0b0';
    return `<div class="lead">
      <span class="pill" style="color:${c};background:${c}1f">${esc(l.status||'—')}</span>
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap"><span class="font-bold text-[15px]">${esc(l.name||'—')}</span>${l.company?`<span class="text-muted text-sm">· ${esc(l.company)}</span>`:''}${l.lang?`<span class="text-[10px] font-bold text-muted border border-navy/15 rounded px-1.5 py-0.5">${esc(l.lang).toUpperCase()}</span>`:''}</div>
        <a href="mailto:${esc(l.email)}" class="text-sm text-red font-semibold">${esc(l.email||'')}</a>
        <p class="text-sm text-navy/80 mt-2 leading-relaxed">${esc(l.message||'')}</p>
        ${l.quote?`<div class="text-xs text-muted mt-2 bg-paper border border-navy/8 rounded-lg px-3 py-2"><b class="text-navy">💡 AI suggested:</b> ${esc(l.quote)}</div>`:''}
      </div>
      <div class="text-right shrink-0 flex flex-col items-end gap-2">
        <div class="text-xs text-muted whitespace-nowrap">${fmt(l.created)}</div>
        <a href="${l.url}" target="_blank" class="text-xs font-bold text-navy border border-navy/15 rounded-lg px-2.5 py-1 hover:bg-navy hover:text-white transition">Open →</a>
      </div>
    </div>`;
  }).join('');
}
load();
</script>
</body>
</html>
